server:
  port: 8080

spring:
  application:
    name: ops-management

  datasource:
    url: jdbc:mysql://localhost:3306/ops_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: ops-management-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.ops.management: DEBUG
    org.springframework.security: INFO
